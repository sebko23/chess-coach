name: smoke-prebuilt

on:
  push:
    branches: [main]

jobs:
  hello:
    runs-on: ubuntu-latest
    services:
      # No build:, no options:. Just image.
      # The image doesn't exist in any registry - this will
      # fail at job start, but the workflow itself should
      # parse fine and the job should appear.
      backend:
        image: chess-coach-backend:ci
        ports:
          - 18080:18080
    steps:
      - run: |
          echo "image-only service works"
