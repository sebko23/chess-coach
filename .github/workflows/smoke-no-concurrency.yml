name: smoke-no-concurrency

on:
  push:
    branches: [main]

# NO concurrency block (the smoke.yml has one; smoke-simple doesn't
# have services or concurrency)

jobs:
  hello:
    runs-on: ubuntu-latest
    services:
      backend:
        image: chess-coach-backend:ci
        build:
          context: .
          dockerfile: Dockerfile
        ports:
          - 18080:18080
        env:
          CHESS_COACH_BACKEND_TOKEN: devtoken123
          CHESS_COACH_MAX_WORKERS: "1"
    steps:
      - run: echo "hello from smoke-no-concurrency"
